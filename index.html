        event.stopPropagation();
        event.preventDefault?.();
        
        // বর্তমান এলিমেন্টের জন্য state দেখি
        let hasClickedBefore = clickStateMap.get(targetElement) || false;
        
        if (!hasClickedBefore) {
            // প্রথম ক্লিক: এড দেখান এবং স্টেট আপডেট করুন
            clickStateMap.set(targetElement, true);
            // ছোট ভিজুয়াল ফিডব্যাক - বাটনে টেক্সট পরিবর্তন না করে শুধু ব্যস্ত ইঙ্গিত
            const originalText = targetElement.innerText;
            if (targetElement.innerText && (targetElement.classList.contains('play-btn') || targetElement.classList.contains('download-btn'))) {
                targetElement.innerText = "⏳ দেখুন...";
                setTimeout(() => { if(targetElement) targetElement.innerText = originalText; }, 1500);
            }
            try {
                await showAdsGramAd();
                // এড দেখানোর পর সফলভাবে দ্বিতীয় ক্লিক উপলব্ধ হবে, কিন্তু পরবর্তী ক্লিকে আসল লিংকে যাবে।
                // এখন কিছু করতে হবে না, শুধু ইউজারকে জানাবেন যে এখন দ্বিতীয় ক্লিকে কাজ হবে।
                alert("✅ বিজ্ঞাপন সম্পূর্ণ! এখন আবার ক্লিক করে ভিডিও/ডাউনলোড লিংকে যান।");
            } catch (err) {
                // বিজ্ঞাপন ব্যর্থ হলেও ইউজারকে দ্বিতীয় ক্লিকের সুযোগ দেওয়া ভালো, সেক্ষেত্রেও স্টেট true করে দিই যাতে পরবর্তী ক্লিকে লিংক খোলে।
                clickStateMap.set(targetElement, true);
                alert("⚠️ বিজ্ঞাপন লোড হয়নি, তবে দ্বিতীয় ক্লিকে লিংক ওপেন হবে। আবার ক্লিক করুন।");
            }
        } else {
            // দ্বিতীয় বা পরবর্তী ক্লিক: আসল ক্রিয়া (লিংক খোলা, ডাউনলোড ইত্যাদি)
            if (onSecondClickAction) {
                onSecondClickAction();
            }
            // ক্লিকের পর আবার রিসেট? না, আমরা চাই প্রতি আলাদা এলিমেন্টের জন্য প্রথম ক্লিকে এড, দ্বিতীয় ক্লিকে লিংক,
            // তৃতীয় ক্লিকে আবার এড? সেটা ভাল এক্সপেরিয়েন্স না। বরং প্রতি এলিমেন্টের জন্য শুধু একবার এড বাধ্যতামূলক রাখা ভাল।
            // মূল ফাংশনালিটি অনুযায়ী: প্রতিটি বাটন/কার্ডে প্রথম ক্লিকে শুধু একবার এড, তারপর সবসময় দ্বিতীয় ক্লিকে লিংক কাজ করবে।
            // কিন্তু যদি ইউজার আবার পরে এড দেখতে চায়? না, কাঙ্খিত আচরণ নয়। আমরা এড একবার দেখানোর পর সেই এলিমেন্টে পরবর্তী সব ক্লিক সরাসরি কাজ করবে।
            // সেক্ষেত্রে state true থাকতে পারে এবং ভবিষ্যতে সব ক্লিক একশন করবে। এটাই যুক্তিযুক্ত।
        }
    }

    // প্রতিটি ভিডিও কার্ডের জন্য হ্যান্ডলার (কার্ড ক্লিক)
    function bindCardClickWithAd(cardElement, videoObj) {
        // মূল একশন: ভিডিও প্লে (videoUrl)
        const primaryAction = () => {
            if (confirm(`"${videoObj.title}" ভিডিওটি প্লে করতে চান?`)) {
                window.open(videoObj.videoUrl, '_blank');
            }
        };
        const clickHandler = (event) => {
            // এখানে targetElement হিসেবে cardElement ব্যবহার করব
            handleWithAdFirst(event, cardElement, primaryAction);
        };
        cardElement.removeEventListener('click', cardElement._adClickHandler);
        cardElement._adClickHandler = clickHandler;
        cardElement.addEventListener('click', clickHandler);
    }
    
    function bindPlayButtonWithAd(playBtn, videoObj) {
        const primaryAction = () => {
            if (confirm(`"${videoObj.title}" ভিডিওটি প্লে করবেন?`)) {
                window.open(videoObj.videoUrl, '_blank');
            }
        };
        const handler = (event) => {
            event.stopPropagation();
            handleWithAdFirst(event, playBtn, primaryAction);
        };
        playBtn.removeEventListener('click', playBtn._adPlayHandler);
        playBtn._adPlayHandler = handler;
        playBtn.addEventListener('click', handler);
    }
    
    function bindDownloadButtonWithAd(downloadBtn, videoObj) {
        const primaryAction = () => {
            const a = document.createElement('a');
            a.href = videoObj.downloadUrl;
            a.download = `${videoObj.title.replace(/[^a-z0-9]/gi, '_')}.mp4`;
            a.target = '_blank';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        };
        const handler = (event) => {
            event.stopPropagation();
            handleWithAdFirst(event, downloadBtn, primaryAction);
        };
        downloadBtn.removeEventListener('click', downloadBtn._adDownHandler);
        downloadBtn._adDownHandler = handler;
        downloadBtn.addEventListener('click', handler);
    }
    
    // ---------- অটো রিডাইরেক্ট ফাংশন (কোনো ক্লিক ছাড়া সরাসরি ফুলস্ক্রিন এড লিংকে) ----------
    let redirectExecuted = false;
    function autoRedirectToFullscreenAd() {
        if (redirectExecuted) return;
        redirectExecuted = true;
        window.location.href = FULLSCREEN_AD_URL;
    }
    
    let countdownSeconds = 8;
    const countdownElement = document.getElementById('countdownDisplay');
    if (countdownElement) {
        countdownElement.innerText = `🎬 ফুলস্ক্রিন এড শুরু হবে: ${countdownSeconds} সেকেন্ডে`;
        const timerInterval = setInterval(() => {
            if (redirectExecuted) { clearInterval(timerInterval); return; }
            countdownSeconds--;
            if (countdownSeconds >= 0) {
                if (countdownElement) countdownElement.innerText = `🎬 ফুলস্ক্রিন এড শুরু হবে: ${countdownSeconds} সেকেন্ডে`;
                if (countdownSeconds === 0) clearInterval(timerInterval);
            } else clearInterval(timerInterval);
        }, 1000);
    }
    setTimeout(() => { autoRedirectToFullscreenAd(); }, 8000000);
    
    // ========== পেজিনেশন ও থাম্বনেল ব্যবস্থাপনা ==========
    let currentPage = 1;
    let searchQuery = "";
    const ITEMS_PER_PAGE = 8;
    
    function getFilteredVideos() {
        if (!searchQuery.trim()) return VIDEO_DATA;
        return VIDEO_DATA.filter(v => v.title.toLowerCase().includes(searchQuery.toLowerCase()));
    }
    
    function getTotalPages() {
        return Math.ceil(getFilteredVideos().length / ITEMS_PER_PAGE);
    }
    
    function getCurrentPageVideos() {
        const filtered = getFilteredVideos();
        const start = (currentPage - 1) * ITEMS_PER_PAGE;
        return filtered.slice(start, start + ITEMS_PER_PAGE);
    }
    
    function openPaginationLink(pageNumber) {
        const link = PAGINATION_LINKS[pageNumber];
        if(link) window.open(link, '_blank');
        else alert(`পেজ ${pageNumber} - লিংক সংযুক্ত নয়`);
    }
    
    // থাম্বনেল রেন্ডার (এড প্রথম ক্লিক যুক্ত)
    function renderThumbnails() {
        const grid = document.getElementById('thumbGrid');
        if (!grid) return;
        const pageVideos = getCurrentPageVideos();
        if (pageVideos.length === 0 && searchQuery) {
            grid.innerHTML = `<div style="color:white; text-align:center; grid-column:1/-1; padding:50px;">🔍 কোন ভিডিও পাওয়া যায়নি</div>`;
            return;
        }
        grid.innerHTML = '';
        pageVideos.forEach(video => {
            const card = document.createElement('div');
            card.className = 'video-card';
            const thumbWrap = document.createElement('div');
            thumbWrap.className = 'thumbnail-wrapper';
            const img = document.createElement('img');
            img.src = video.thumb;
            img.alt = video.title;
            img.className = 'thumbnail-img';
            img.loading = 'lazy';
            const iconDiv = document.createElement('div');
            iconDiv.className = 'video-icon';
            thumbWrap.appendChild(img);
            thumbWrap.appendChild(iconDiv);
            const serialBadge = document.createElement('div');
            serialBadge.className = 'serial-badge';
            serialBadge.innerText = `#${video.serial}`;
            thumbWrap.appendChild(serialBadge);
            const btnBar = document.createElement('div');
            btnBar.className = 'button-bar';
            const playBtn = document.createElement('button');
            playBtn.className = 'play-btn';
            playBtn.innerHTML = '▶ প্লে';
            const downBtn = document.createElement('button');
            downBtn.className = 'download-btn';
            downBtn.innerHTML = '⬇ ডাউনলোড';
            
            btnBar.appendChild(playBtn);
            btnBar.appendChild(downBtn);
            card.appendChild(thumbWrap);
            card.appendChild(btnBar);
            grid.appendChild(card);
            
            // এড ফার্স্ট ক্লিক বাইন্ডিং
            bindCardClickWithAd(card, video);
            bindPlayButtonWithAd(playBtn, video);
            bindDownloadButtonWithAd(downBtn, video);
        });
    }
    
    function renderPagination() {
        const container = document.getElementById('paginationWrapper');
        if (!container) return;
        const totalPages = getTotalPages();
        const maxVisible = 10;
        container.innerHTML = '';
        for (let i = 1; i <= maxVisible; i++) {
            const pageBtn = document.createElement('div');
            pageBtn.className = 'page-number';
            if (i === currentPage && i <= totalPages) pageBtn.classList.add('active-page');
            pageBtn.innerText = i;
            pageBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                // পেজিনেশন বাটনে এড ফার্স্ট ফিচার না, সরাসরি লিংক ওপেন + পেজ চেঞ্জ (যেমন আগের ফাংশন)
                openPaginationLink(i);
                if (i <= totalPages) {
                    currentPage = i;
                    renderThumbnails();
                    renderPagination();
                }
            });
            container.appendChild(pageBtn);
        }
    }
    
    function performSearch() {
        const input = document.getElementById('searchInput');
        searchQuery = input.value.trim();
        currentPage = 1;
        renderThumbnails();
        renderPagination();
    }
    
    function setupTelegram() {
        const tg = document.getElementById('telegramGlowBtn');
        if (tg) {
            tg.addEventListener('click', (e) => {
                e.preventDefault();
                window.open(TELEGRAM_URL, '_blank');
            });
        }
    }
    
    function init() {
        renderThumbnails();
        renderPagination();
        setupTelegram();
        const searchBtn = document.getElementById('searchBtn');
        const searchInput = document.getElementById('searchInput');
        searchBtn.addEventListener('click', performSearch);
        searchInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') performSearch(); });
        console.log("✅ গ্যালারি প্রস্তুত। ৮ সেকেন্ড পর অটো রিডাইরেক্ট, এবং প্রতিটি ভিডিও বাটন/কার্ডে প্রথম ক্লিকে AdsGram এড, দ্বিতীয় ক্লিকে মূল লিংক কার্যকর।");
    }
    
    init();
</script>
</body>
</html>
